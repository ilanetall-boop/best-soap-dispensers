<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparisons - Best Soap Dispensers</title>
  <meta name="description" content="Side-by-side soap dispenser comparisons. Automatic vs manual, liquid vs bar soap, and more.">
  <meta property="og:title" content="Comparisons - Best Soap Dispensers">
  <meta property="og:description" content="Side-by-side soap dispenser comparisons.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://best-soap-dispensers.com/comparisons">
  <link rel="canonical" href="https://best-soap-dispensers.com/comparisons">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="components/site-config.js?v=5"></script>
  <style>
    :root { --primary: #4E342E; --primary-light: #795548; --accent: #26C6DA; --text: #3e3e3e; --text-light: #666; --border: #e5e5e5; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: var(--text); background: #fff; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
    .page-header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: #fff; padding: 3rem 0; text-align: center; }
    .page-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: .5rem; }
    .page-header p { opacity: .9; font-size: 1.1rem; }
    .articles-section { padding: 3rem 0; }
    .articles-grid { display: grid; gap: 1.5rem; }
    .article-card { background: #fff; border-radius: .75rem; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: transform .3s ease; border: 1px solid var(--border); }
    .article-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,.12); }
    .article-card img { width: 100%; height: auto; aspect-ratio: 400/192; object-fit: cover; }
    .article-card-content { padding: 1.25rem; }
    .article-card h3 { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin-bottom: .5rem; }
    .article-card h3 a { color: inherit; text-decoration: none; }
    .article-card h3 a:hover { color: var(--accent); }
    .article-card p { color: var(--text-light); font-size: .875rem; margin-bottom: 1rem; }
    .read-more { color: var(--accent); font-weight: 600; text-decoration: none; font-size: .875rem; }
    .no-results { text-align: center; padding: 3rem; color: var(--text-light); }
    @media (min-width: 768px) { .articles-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <header id="site-header"></header>

  <section class="page-header">
    <div class="container">
      <h1>Comparisons</h1>
      <p>Head-to-head soap dispenser comparisons to help you decide</p>
    </div>
  </section>

  <section class="articles-section">
    <div class="container">
      <div class="articles-grid" id="articles-grid">
        <div class="no-results">Loading comparisons...</div>
      </div>
    </div>
  </section>

  <footer id="site-footer"></footer>
  <script src="components/site-components.js?v=4"></script>
  <script>
    function formatDate(d) { return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',year:'numeric'}); }

    fetch('articles.json').then(r=>r.json()).then(articles => {
      const comps = articles.filter(a => a.category === 'Comparisons').sort((a,b) => new Date(b.publishDate)-new Date(a.publishDate));
      const grid = document.getElementById('articles-grid');
      if (comps.length === 0) {
        grid.innerHTML = '<div class="no-results"><p>No comparisons yet. Check back soon!</p></div>';
        return;
      }
      grid.innerHTML = comps.map(a => `<article class="article-card">
        <a href="${a.slug}"><img src="${a.image}" alt="${a.title}" width="400" height="192" loading="lazy"></a>
        <div class="article-card-content">
          <h3><a href="${a.slug}">${a.title}</a></h3>
          <p>${a.summary}</p>
          <a href="${a.slug}" class="read-more">Read comparison &rarr;</a>
        </div>
      </article>`).join('');
    }).catch(() => {
      document.getElementById('articles-grid').innerHTML = '<div class="no-results"><p>No comparisons yet. Check back soon!</p></div>';
    });
  </script>
</body>
</html>
